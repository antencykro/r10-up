name: R10 Yukari Tasima

on:
  schedule:
    # Her 5 dakikada bir "vakti geldi mi?" diye bakar. r10'a SADECE rastgele
    # hedef (60-75 dk) dolunca istek atar; digerinde dokunmadan cikar.
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      test:
        description: 'Test modu (sonuc ne olursa Telegram at, sure beklemeden dene)'
        type: boolean
        default: true

permissions:
  contents: write   # r10-state.json'i repoya geri yazabilmek icin

concurrency:
  group: r10-up
  cancel-in-progress: false

jobs:
  up:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Konuyu yukari tasi
        env:
          R10_COOKIE:     ${{ secrets.R10_COOKIE }}
          TG_BOT_TOKEN:   ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:     ${{ secrets.TG_CHAT_ID }}
          R10_UP_URL:     'https://www.r10.net/up.php?t=ldNdX7zqFx6iABR1041Rq0ZQ&rf=1'
          R10_TOPIC_NAME: 'Razer/iTunes Bozum'
          R10_TEST:       ${{ github.event_name == 'workflow_dispatch' && inputs.test }}
        run: python r10_yukari.py

      - name: Durumu kaydet (sadece degistiyse)
        if: always()
        run: |
          if [ -n "$(git status --porcelain r10-state.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add r10-state.json
            git commit -m "state: tasima kaydi [skip ci]"
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break
              echo "push tekrar deneniyor ($i)..."; sleep 3
            done
          else
            echo "Durum degismedi, commit yok."
          fi
